<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameTogether - 一块游戏</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- GSAP 动画库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- AOS 滚动动画库 -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#ec4899',
                        dark: '#0f172a',
                        darkLight: '#1e293b',
                        neon: '#06b6d4'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 0 0 10px rgba(6, 182, 212, 0.7);
            }
            .text-shadow-lg {
                text-shadow: 0 0 20px rgba(6, 182, 212, 0.9), 0 0 30px rgba(6, 182, 212, 0.6);
            }
            .glow {
                box-shadow: 0 0 15px rgba(6, 182, 212, 0.7);
            }
            .glow-lg {
                box-shadow: 0 0 25px rgba(6, 182, 212, 0.9), 0 0 40px rgba(6, 182, 212, 0.6);
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-10px) scale(1.02);
            }
            .bg-gradient-game {
                background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            }
            .bg-card-overlay {
                background: linear-gradient(to top, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.5) 50%, rgba(15, 23, 42, 0.7) 100%);
            }
            .ripple {
                position: relative;
                overflow: hidden;
            }
            .ripple:after {
                content: "";
                display: block;
                position: absolute;
                width: 100%;
                height: 100%;
                top: 0;
                left: 0;
                pointer-events: none;
                background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
                background-repeat: no-repeat;
                background-position: 50%;
                transform: scale(10, 10);
                opacity: 0;
                transition: transform 0.5s, opacity 0.8s;
            }
            .ripple:active:after {
                transform: scale(0, 0);
                opacity: 0.3;
                transition: 0s;
            }
        }
    </style>
    
    <style>
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4f46e5;
        }
        
        /* 粒子背景 */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }
        
        /* 卡片悬停光效 */
        .card {
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
            transform: rotate(45deg);
            transition: all 0.6s ease;
            opacity: 0;
        }
        .card:hover::before {
            animation: shine 1.5s ease;
            opacity: 1;
        }
        @keyframes shine {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }
        
        /* 导航栏滚动效果 */
        .navbar {
            transition: all 0.3s ease;
        }
        .navbar.scrolled {
            background-color: rgba(15, 23, 42, 0.95);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-game min-h-screen text-white font-sans">
    <!-- 粒子背景 -->
    <div id="particles-js"></div>
    
    <!-- 导航栏 -->
    <nav class="navbar fixed w-full z-50 py-4 px-6 md:px-12">
        <div class="container mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center space-x-2">
                <img src="https://pic1.imgdb.cn/item/69cfa72edf10edaed90f7072.png" alt="GameVerse Logo" class="h-10 w-10">
                <span class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-neon to-secondary text-shadow">一块游戏</span>
            </a>
            
            <div class="hidden md:flex space-x-8">
            </div>
            
            <div class="flex items-center">
                <button class="md:hidden text-2xl" id="mobile-menu-button">
                    <i class="fa fa-bars"></i>
                </button>
            </div>
        </div>
        
        <!-- 移动端菜单 -->
        <div id="mobile-menu" class="hidden md:hidden absolute top-full left-0 w-full bg-darkLight py-4 px-6 shadow-lg">
            <div class="flex flex-col space-y-4">
            </div>
        </div>
    </nav>
    
    <!-- 主内容区 -->
    <main class="container mx-auto pt-32 pb-20 px-6 md:px-12">
        <!-- 欢迎标题 -->
        <div class="text-center mb-16" data-aos="fade-up" data-aos-duration="1000">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-neon to-secondary text-shadow-lg">
                探索游戏世界
            </h1>
            <p class="text-xl md:text-2xl text-gray-300 max-w-3xl mx-auto">
                发现最热门的单机游戏、ACG和复古经典，开启你的游戏之旅
            </p>
        </div>
        
        <!-- 游戏板块 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- 单机游戏 -->
            <div id="single-player" class="card card-hover rounded-xl overflow-hidden h-[500px] glow" data-aos="fade-up" data-aos-delay="100" data-aos-duration="1000">
                <div class="relative h-full">
                    <img src="https://pic1.imgdb.cn/item/69cfa592df10edaed90f68ef.jpg" alt="单机游戏" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-0 bg-card-overlay"></div>
                    <div class="absolute inset-0 flex flex-col justify-end p-8">
                        <div class="transform transition-transform duration-500 card-hover">
                            <h2 class="text-4xl font-bold mb-4 text-shadow">单机游戏</h2>
                            <p class="text-gray-300 mb-6">探索最新最热门的单机游戏，体验沉浸式的游戏世界和精彩剧情</p>
                            <button onclick="window.open('https://gametogether1.github.io/mygame/', '_blank')" 
                                    class="px-6 py-3 rounded-full bg-neon hover:bg-opacity-90 transition-all duration-300 text-dark font-bold ripple flex items-center gap-2">
                                立即探索 <i class="fa fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 热门ACG -->
            <div id="acg" class="card card-hover rounded-xl overflow-hidden h-[500px] glow" data-aos="fade-up" data-aos-delay="200" data-aos-duration="1000">
                <div class="relative h-full">
                    <img src="https://pic1.imgdb.cn/item/69d52039cfae5fcb267afbfe.png" alt="外网ACG" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-0 bg-card-overlay"></div>
                    <div class="absolute inset-0 flex flex-col justify-end p-8">
                        <div class="transform transition-transform duration-500 card-hover">
                            <h2 class="text-4xl font-bold mb-4 text-shadow">外网ACG</h2>
                            <p class="text-gray-300 mb-6">最新最热的ACG游戏，每日更新，在这里就能体验外网的内容</p>
                            <button onclick="window.open('https://gametogether1.github.io/myacg/', '_blank')" 
                                    class="px-6 py-3 rounded-full bg-secondary hover:bg-opacity-90 transition-all duration-300 text-white font-bold ripple flex items-center gap-2">
                                浏览ACG <i class="fa fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 复古模拟 -->
            <div id="retro" class="card card-hover rounded-xl overflow-hidden h-[500px] glow" data-aos="fade-up" data-aos-delay="300" data-aos-duration="1000">
                <div class="relative h-full">
                    <img src="https://pic1.imgdb.cn/item/69cfa6a1df10edaed90f6f1e.jpg" alt="复古模拟" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-0 bg-card-overlay"></div>
                    <div class="absolute inset-0 flex flex-col justify-end p-8">
                        <div class="transform transition-transform duration-500 card-hover">
                            <h2 class="text-4xl font-bold mb-4 text-shadow">复古模拟</h2>
                            <p class="text-gray-300 mb-6">重温经典游戏时光，通过模拟器体验那些陪伴我们成长的经典之作</p>
                            <button onclick="window.open('https://gametogether1.github.io/myemu/', '_blank')" 
                                    class="px-6 py-3 rounded-full bg-primary hover:bg-opacity-90 transition-all duration-300 text-white font-bold ripple flex items-center gap-2">
                                怀旧之旅 <i class="fa fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- 页脚 -->
    <footer class="bg-darkLight py-8 px-6 md:px-12">
        <div class="container mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-6 md:mb-0">
                    <a href="#" class="flex items-center space-x-2">
                        <img src="https://pic1.imgdb.cn/item/69cfa72edf10edaed90f7072.png" alt="GameVerse Logo" class="h-8 w-8">
                        <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-neon to-secondary">一块游戏</span>
                    </a>
                    <p class="text-gray-400 mt-2">探索无限游戏世界</p>
                </div>
                
                <div class="flex space-x-6">
                    <a href="#" class="text-gray-400 hover:text-neon transition-colors duration-300">
                        <i class="fa fa-weixin text-2xl"></i>
                    </a>
                    <a href="#" class="text-gray-400 hover:text-neon transition-colors duration-300">
                        <i class="fa fa-twitter-square text-2xl"></i>
                    </a>
                    <a href="#" class="text-gray-400 hover:text-neon transition-colors duration-300">
                        <i class="fa fa-instagram text-2xl"></i>
                    </a>
                    <a href="#" class="text-gray-400 hover:text-neon transition-colors duration-300">
                        <i class="fa fa-youtube-play text-2xl"></i>
                    </a>
                    
                </div>
            </div>
            
            <div class="border-t border-gray-700 mt-8 pt-8 flex flex-col md:flex-row justify-between items-center">
                <p class="text-gray-400 text-sm mb-4 md:mb-0">© 2026 GameVerse. 保留所有权利。</p>
                <div class="flex space-x-6">
                    <a href="#" class="text-gray-400 hover:text-neon transition-colors duration-300 text-sm">隐私政策</a>
                    <a href="#" class="text-gray-400 hover:text-neon transition-colors duration-300 text-sm">使用条款</a>
                    <a href="#" class="text-gray-400 hover:text-neon transition-colors duration-300 text-sm">联系我们</a>
                </div>
            </div>
        </div>
    </footer>
    
    <!-- 粒子背景JS -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <!-- 主脚本 -->
    <script>
        // 初始化AOS动画库
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init();
            
            // 导航栏滚动效果
            const navbar = document.querySelector('.navbar');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
            
            // 移动端菜单切换
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');
            
            mobileMenuButton.addEventListener('click', function() {
                mobileMenu.classList.toggle('hidden');
            });
            
            // 初始化粒子背景
            particlesJS('particles-js', {
                particles: {
                    number: {
                        value: 80,
                        density: {
                            enable: true,
                            value_area: 800
                        }
                    },
                    color: {
                        value: "#06b6d4"
                    },
                    shape: {
                        type: "circle",
                        stroke: {
                            width: 0,
                            color: "#000000"
                        }
                    },
                    opacity: {
                        value: 0.5,
                        random: true,
                        anim: {
                            enable: true,
                            speed: 1,
                            opacity_min: 0.1,
                            sync: false
                        }
                    },
                    size: {
                        value: 3,
                        random: true,
                        anim: {
                            enable: true,
                            speed: 2,
                            size_min: 0.1,
                            sync: false
                        }
                    },
                    line_linked: {
                        enable: true,
                        distance: 150,
                        color: "#06b6d4",
                        opacity: 0.2,
                        width: 1
                    },
                    move: {
                        enable: true,
                        speed: 1,
                        direction: "none",
                        random: true,
                        straight: false,
                        out_mode: "out",
                        bounce: false,
                        attract: {
                            enable: false,
                            rotateX: 600,
                            rotateY: 1200
                        }
                    }
                },
                interactivity: {
                    detect_on: "canvas",
                    events: {
                        onhover: {
                            enable: true,
                            mode: "grab"
                        },
                        onclick: {
                            enable: true,
                            mode: "push"
                        },
                        resize: true
                    },
                    modes: {
                        grab: {
                            distance: 140,
                            line_linked: {
                                opacity: 0.5
                            }
                        },
                        push: {
                            particles_nb: 3
                        }
                    }
                },
                retina_detect: true
            });
            
            
            
            // 导航链接点击事件
            const navLinks = document.querySelectorAll('nav a');
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    const href = this.getAttribute('href');
                    if (href.startsWith('#')) {
                        e.preventDefault();
                        const targetId = href.substring(1);
                        const targetElement = document.getElementById(targetId);
                        
                        if (targetElement) {
                            window.scrollTo({
                                top: targetElement.offsetTop - 100,
                                behavior: 'smooth'
                            });
                            
                            // 关闭移动端菜单
                            if (!mobileMenu.classList.contains('hidden')) {
                                mobileMenu.classList.add('hidden');
                            }
                        }
                    }
                });
            });
            
            // 使用GSAP添加额外的动画效果
            gsap.from('.navbar', {
                y: -100,
                opacity: 0,
                duration: 1,
                ease: 'power3.out'
            });
            
            gsap.from('h1', {
                y: 50,
                opacity: 0,
                duration: 1,
                delay: 0.3,
                ease: 'power3.out'
            });
            
            gsap.from('p', {
                y: 30,
                opacity: 0,
                duration: 1,
                delay: 0.6,
                ease: 'power3.out'
            });
        });
    </script>
</body>
</html>
